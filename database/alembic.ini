[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
version_path_separator = os

# DATABASE_URL is read from the environment at runtime (see alembic/env.py)
# sqlalchemy.url = postgresql+psycopg2://user:password@localhost/ecu_testing

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
